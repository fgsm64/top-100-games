name: Update README

on:
  push:
    branches: [main]
    paths:
      - src/top_100_games.txt

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Run numberer
        run: python src/numberer.py

      - name: Commit README
        run: |
          git config user.name "fgsm64"
          git config user.email "123595266+fgsm64@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README from top_100_games.txt"
          git push
